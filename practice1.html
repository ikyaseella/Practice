<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practicing Javascript</title>
</head>
<body>

    <!-- using the Dom for manipulation -->
        <h4>I am going to use the dom to manipulate the paragraph below simply by clicking on  the "change paragraph button"</h4>
        <p id="changePara">I will graduate and build a beautiful project from Agility Amen</p>
        <button onclick="change()">change paragraph </button>
        

     <script>
        function change(){
            document.getElementById("changePara").innerText="Amen"
        }

     </script>
    
</body>
</html>
